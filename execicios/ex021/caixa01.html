<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1{ /* box-level */
            background-color: lightgray;
            width: 300px;
            height: 300px;

            border-width: 10px;
            border-style: solid;
            border-color: darkgray;
            
            /* Simplificado */
            border: 10px solid darkgrey;

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;

            /* Se for o mesmo tamanho para todos os lado só precisa colocar uma medida */
            padding: 10px;

            margin-top: 20px;
            margin-right: auto;
            margin-bottom: 30px;
            margin-left: auto;

            /* Para centralizar coloque auto no lados, se for uma caixa */
            margin: 20px auto 30px auto;

            outline-width: 5px;
            outline-style: dashed;
            outline-color: darkblue;

            outline: 5px dashed darkblue;
        }

        a{ /* inline- level*/
            border: 5px solid darkgray;

            padding: 5px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafo também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
</body>
</html>
